<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Federico Polloni — La cava degli specchi</title>
  <meta name="description" content="La cava degli specchi, 2022, acrylic and oil on canvas, 120 × 100 cm. Artwork by Federico Polloni." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 400;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 42px 48px 56px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 70px;
    }

    header a {
      color: #111111;
      text-decoration: none;
      border-bottom: 1px solid #111111;
    }

    .work {
      width: 60%;
      margin: 0 auto;
    }

    img {
    display: block;
    max-width: min(78vw, 1400px);
    max-height: 82vh;
    width: auto;
    height: auto;
    margin: 0 auto;
    object-fit: contain;
}

    .caption {
      width: 60%;
      margin: 24px auto 0;
      text-align: left;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.45;
    }

    .meta {
      margin: 0;
    }

    .meta span {
      display: block;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 16px;
      border: 1px solid #111111;
      color: #111111;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .button:hover {
      background: #111111;
      color: #ffffff;
    }

    @media (max-width: 900px) {
      .page {
        padding: 28px 22px 40px;
      }

      header {
        margin-bottom: 36px;
      }

      .work,
      .caption {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <header>
      <div>Federico Polloni</div>
      <a href="https://www.instagram.com/federicopolloni/" target="_blank" rel="noopener">Instagram</a>
    </header>

    <main>
      <div class="work">
        <img src="la-cava-degli-specchi.jpg" alt="La cava degli specchi, Federico Polloni" />
      </div>

      <div class="caption">
        <h1>La cava degli specchi</h1>

        <p class="meta">
          <span>2022</span>
          <span>Acrylic and oil on canvas</span>
          <span>120 × 100 cm</span>
        </p>

        <a class="button" href="https://www.dropbox.com/scl/fi/4qra2wsh8mpn7952mjhrw/Polloni_Federico_portfolio2026_WEB.pdf?rlkey=1j5lgm0y8pdfgc29x3oeuvrpf&amp;st=pvcuxuuo&amp;raw=1" target="_blank" rel="noopener">
          View Full Portfolio (PDF)
        </a>
      </div>
    </main>

  </div>
</body>
</html>
