<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Federico Polloni — La cava degli specchi</title>
  <meta name="description" content="La cava degli specchi, 2022, acrylic and oil on canvas, 120 × 100 cm. Federico Polloni." />
  <meta property="og:title" content="Federico Polloni — La cava degli specchi" />
  <meta property="og:description" content="2022, acrylic and oil on canvas, 120 × 100 cm." />
  <meta property="og:image" content="la-cava-degli-specchi.jpg" />
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --line: #e8e8e8;
      --bg: #fff;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .page {
      width: min(1180px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0 54px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 42px;
      color: var(--text);
      letter-spacing: .01em;
    }
    header a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    header a:hover { border-bottom-color: currentColor; }
    .role { color: var(--muted); font-size: 13px; }
    main { display: grid; grid-template-columns: 1fr; gap: 26px; }
    .image-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    img.artwork {
      display: block;
      width: min(760px, 100%);
      height: auto;
      max-height: 80vh;
      object-fit: contain;
    }
    .caption {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 400;
      font-style: italic;
    }
    .details p { margin: 0; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 18px;
      border: 1px solid var(--text);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .01em;
      transition: background .2s ease, color .2s ease;
      white-space: nowrap;
    }
    .button:hover { background: var(--text); color: var(--bg); }
    footer {
      width: min(760px, 100%);
      margin: 54px auto 0;
      color: var(--muted);
      font-size: 13px;
    }
    footer a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; }
    @media (max-width: 720px) {
      .page { width: calc(100vw - 26px); padding-top: 22px; }
      header { margin-bottom: 28px; }
      .role { display: none; }
      img.artwork { width: 100%; max-height: none; }
      .caption { grid-template-columns: 1fr; gap: 18px; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="mailto:fefedrico@gmail.com">Federico Polloni</a>
      <span class="role">Visual artist</span>
    </header>

    <main>
      <div class="image-wrap">
        <img class="artwork" src="la-cava-degli-specchi.jpg" alt="La cava degli specchi, 2022, acrylic and oil on canvas, 120 × 100 cm, by Federico Polloni" />
      </div>

      <section class="caption" aria-label="Artwork information">
        <div class="details">
          <h1>La cava degli specchi</h1>
          <p>2022</p>
          <p>Acrylic and oil on canvas</p>
          <p>120 × 100 cm</p>
        </div>
        <a class="button" href="#" aria-label="View full portfolio PDF">View Full Portfolio (PDF)</a>
      </section>
    </main>

    <footer>
      <span>Contact: </span><a href="mailto:fefedrico@gmail.com">fefedrico@gmail.com</a>
    </footer>
  </div>
</body>
</html>
